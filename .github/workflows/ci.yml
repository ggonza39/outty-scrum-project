name: Outty Project CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- JOB 1: FRONTEND VALIDATION ---
  # Ensures the Next.js app passes the 12 Vitest tests and builds successfully
  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './application/frontend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./application/frontend
        run: npm ci

      - name: Run Vitest (Unit & BDD)
        working-directory: ./application/frontend
        run: npm run test

      - name: Check Build Quality
        working-directory: ./application/frontend
        run: npm run build

  # --- JOB 2: BACKEND VALIDATION ---
  # Ensures your Java/JUnit logic is sound
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run JUnit Tests
        # Ensure this points to the folder containing your backend pom.xml
        working-directory: ./application/backend 
        run: mvn test

  # --- JOB 3: VERCEL DEPLOYMENT TRIGGER ---
  # This only runs if Frontend AND Backend tests pass 100%
  deploy:
    needs: [frontend-validation, backend-validation]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          working-directory: ./application/frontend
          vercel-args: '--prod'
