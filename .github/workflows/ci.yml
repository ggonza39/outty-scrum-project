name: Outty Project CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- JOB 1: FRONTEND VALIDATION ---
  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './application/frontend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./application/frontend
        run: npm ci

      # --- ACTIVATED: Running the 12 verified tests ---
      - name: Run Vitest (Unit & BDD)
        working-directory: ./application/frontend
        run: npm run test

      - name: Check Build Quality
        working-directory: ./application/frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          # LEFT SIDE: What your code (supabase.ts) wants
          # RIGHT SIDE: The EXACT name from your screenshot
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

 # --- JOB 2: VERCEL DEPLOYMENT TRIGGER ---
  deploy:
    needs: [frontend-validation]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prod'
          # This tells the Action: "Stay at the root, Vercel knows where to go"
          working-directory: .
